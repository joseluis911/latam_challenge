name: CD

# Continuous Delivery: build the Docker image, push to Artifact Registry,
# deploy a new revision to Cloud Run, and smoke-test it.
# Triggers on every push to `main` (i.e. each release/merge of develop).

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/workflows/pages.yml"
      - ".github/workflows/claude-review.yml"
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  PROJECT_ID: latam-challenge-495606
  REGION: us-central1
  SERVICE_NAME: latam-delay-api
  AR_REPO: latam-images

jobs:
  deploy:
    name: Build, push and deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}"
          echo "image_sha=${IMAGE}:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.image_sha }} \
            -t ${{ steps.tag.outputs.image_latest }} \
            .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ steps.tag.outputs.image_sha }}
          docker push ${{ steps.tag.outputs.image_latest }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --image=${{ steps.tag.outputs.image_sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --quiet

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to $URL"

      - name: Smoke test /health
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sS -o /tmp/body -w "%{http_code}" "${{ steps.url.outputs.url }}/health" || echo "000")
            BODY=$(cat /tmp/body)
            echo "Attempt $i: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ] && [ "$BODY" = '{"status":"OK"}' ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed after 5 attempts."
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.tag.outputs.image_sha }}\`" >> $GITHUB_STEP_SUMMARY
