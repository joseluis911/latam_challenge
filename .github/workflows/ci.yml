name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  # The `test` job is intentionally minimal here; it will be completed in
  # feature/part-1-model (model tests) and feature/part-2-api (api tests).
  # See docs/challenge.md for the CI/CD progression.
