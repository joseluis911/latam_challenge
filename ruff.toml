target-version = "py310"
line-length = 100
extend-exclude = [
    "challenge/exploration.ipynb",
    "data",
    "reports",
    ".venv",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
    "C4",   # comprehensions
    "N",    # naming
]
ignore = [
    "E501",  # line too long (formatter handles it)
    "B008",  # FastAPI uses Depends() in defaults
]

[lint.per-file-ignores]
"tests/**/*.py" = ["N802", "N803"]    # test method naming flexibility
"challenge/api.py" = ["N805"]         # Pydantic v1 @validator uses cls, not self

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
